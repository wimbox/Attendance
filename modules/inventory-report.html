<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduMaster Pro - تقارير المخزون</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/edumaster-ui.css">

    <!-- Firebase SDKs -->
    <script src='https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js'></script>
    <script src='https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js'></script>
    <script src='../js/firebase-config.js'></script>
</head>

<body>
    <div class="wrapper">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <i class="fa-solid fa-graduation-cap" style="color:var(--accent-blue);"></i>
                <span>EduMaster Pro</span>
            </div>
            <nav class="nav-menu">
                <a href="../dashboard.html" class="nav-item"><i class="fa-solid fa-chart-pie"></i> <span>نظرة
                        عامة</span></a>
                <div class="nav-divider" style="height:1px; background:var(--border-color); margin:10px 0;"></div>
                <div class="nav-section-title"
                    style="font-size:11px; color:var(--text-secondary); margin:10px 16px; font-weight:700; text-transform:uppercase;">
                    الحسابات</div>
                <a href="../accounting.html" class="nav-item"><i class="fa-solid fa-calculator"></i> <span>السجل
                        المالي</span></a>
                <a href="inventory-report.html" class="nav-item active"><i class="fa-solid fa-file-invoice-dollar"></i>
                    <span>التقارير</span></a>
                <div class="nav-divider" style="height:1px; background:var(--border-color); margin:10px 0;"></div>
                <a href="index.html" class="nav-item logout-link"><i class="fa-solid fa-right-from-bracket"></i>
                    <span>خروج</span></a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="content-container">
                <header class="top-bar">
                    <h1 class="page-title">تقارير الجرد المالي والكمي</h1>
                </header>

                <div class="data-card">
                    <h2>حالة المخزون وربحية الأصناف</h2>
                    <p style="color:var(--text-secondary); font-size: 14px; margin-bottom: 20px;">يوضح التقرير الكميات
                        المتاحة في المستودع وقيمة الربح المتوقعة لكل صنف.</p>
                    <div class="table-responsive">
                        <table class="neuro-table" id="inventory-report-table">
                            <thead>
                                <tr>
                                    <th>اسم الكتاب</th>
                                    <th>الكمية الحالية</th>
                                    <th>تكلفة الوحدة</th>
                                    <th>سعر البيع</th>
                                    <th>هامش الربح</th>
                                    <th>الحالة</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- JS Populated -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="../js/accounting.js"></script>
</body>

</html>

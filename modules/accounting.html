<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduMaster Pro - السجل المالي</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/edumaster-ui.css">

    <!-- Firebase SDKs -->
    <script src='https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js?v=12.9'></script>
    <script src='https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js?v=12.9'></script>
    <script src='../js/firebase-config.js?v=12.9'></script>
</head>

<body>
    <div class="wrapper">
        <aside class="sidebar">
            <!-- Injected by UICore -->
        </aside>

        <main class="main-content">
            <div class="content-container">
                <header class="top-bar">
                    <h1 class="page-title">دفتر اليومية المالي</h1>
                    <div class="action-group">
                        <div
                            style="background: var(--bg-card); padding: 10px 20px; border-radius: 12px; border: 2px solid var(--accent-teal);">
                            <span style="color: var(--text-muted); font-size: 13px;">رصيد الخزينة الحالي:</span>
                            <span id="cash-balance"
                                style="font-weight: 800; color: var(--sidebar-bg); margin-right: 10px;">0.00 ج.م</span>
                        </div>
                    </div>
                </header>

                <div class="data-card">
                    <div class="table-responsive">
                        <table class="app-table" id="ledger-table">
                            <thead>
                                <tr>
                                    <th>التاريخ</th>
                                    <th>النوع</th>
                                    <th>البيان</th>
                                    <th>المبلغ</th>
                                    <th>الرصيد التراكمي</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- JS Populated -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Global Scripts -->
    <script src="../js/storage.js?v=12.9"></script>
    <script src="../js/permissions.js?v=12.9"></script>
    <script src="../js/ui-core.js?v=12.9"></script>
    <script>
        UICore.init();
    </script>
    <script type="module" src="../js/accounting.js?v=12.9"></script>
</body>

</html>

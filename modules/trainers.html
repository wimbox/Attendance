<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduMaster Pro - المدربين</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/edumaster-ui.css">
    <style>
        /* 💎 Premium Trainer UI - Matching Student Style */
        .modal-container {
            max-width: 900px !important;
            border-radius: 20px !important;
            padding: 0 !important;
            overflow: hidden;
            background: var(--bg-main);
        }

        .modal-premium-header {
            background: var(--sidebar-bg);
            color: #fff;
            padding: 25px 35px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-premium-title {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1.5rem;
            font-weight: 800;
        }

        .modal-body-scroll {
            padding: 35px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .form-section-card {
            background: #fff;
            padding: 25px;
            border-radius: 16px;
            box-shadow: var(--shadow-ui);
            border: 1px solid var(--border-soft);
            margin-bottom: 25px;
        }

        body.dark-mode .form-section-card {
            background: var(--bg-card);
        }

        .field-label {
            display: block;
            margin-bottom: 10px;
            font-weight: 800;
            color: var(--sidebar-bg);
            font-size: 1rem;
        }

        body.dark-mode .field-label {
            color: #e2e8f0;
        }

        .field-label span {
            color: #ef4444;
        }

        .oval-input {
            width: 100%;
            padding: 12px 24px;
            border-radius: 50px;
            border: 1.5px solid var(--border-soft);
            background: #fff;
            font-family: inherit;
            font-size: 1rem;
            transition: 0.3s;
        }

        body.dark-mode .oval-input {
            background: var(--bg-card);
            color: #fff;
        }

        .oval-input:focus {
            border-color: var(--accent-teal);
            outline: none;
            box-shadow: 0 0 10px rgba(26, 158, 156, 0.1);
        }

        .row-meta-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
        }

        /* 🆕 QR Component */
        .qr-side-card {
            background: linear-gradient(135deg, rgba(26, 158, 156, 0.05) 0%, rgba(14, 115, 113, 0.1) 100%);
            border: 2px dashed var(--accent-teal);
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            height: 100%;
            min-height: 180px;
        }

        .qr-side-card i {
            font-size: 4rem;
            color: var(--accent-teal);
            margin-bottom: 12px;
            opacity: 0.7;
        }

        .qr-side-card span {
            font-weight: 800;
            font-size: 0.75rem;
            color: var(--accent-teal);
            text-transform: uppercase;
        }

        .premium-footer {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            padding: 20px 35px;
            background: rgba(0, 0, 0, 0.02);
            border-top: 1px solid var(--border-soft);
        }

    </style>

    <!-- Firebase SDKs -->
    <script src='https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js'></script>
    <script src='https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js'></script>
    <script src='../js/firebase-config.js'></script>
</head>

<body>
    <div class="wrapper">
        <aside class="sidebar">
            <!-- Sidebar injected via UICore -->
        </aside>

        <main class="main-content">
            <div class="content-container">
                <header class="top-bar">
                    <div style="display: flex; align-items: center; gap: 20px; flex: 1;">
                        <a href="../dashboard.html" class="btn-neuro"
                            style="background: rgba(255, 255, 255, 0.1); border: 1.5px solid var(--border-soft); color: var(--text-main); text-decoration: none; display: flex; align-items: center; gap: 10px; padding: 10px 20px; border-radius: 50px;">
                            <i class="fa-solid fa-house"></i>
                            <span style="font-weight: 800;">الرئيسية</span>
                        </a>
                        <h1 class="page-title">👨‍🏫 إدارة أعضاء هيئة التدريس</h1>
                    </div>

                    <div class="action-mid" style="flex: 2; max-width: 450px; position: relative; margin: 0 20px;">
                        <i class="fa-solid fa-magnifying-glass"
                            style="position: absolute; right: 20px; top: 16px; color: var(--accent-teal); font-size: 1.1rem; z-index: 5;"></i>
                        <input type="text" id="search-trainers" class="oval-input search-highlight"
                            placeholder="ابحث عن محاضر (بالاسم، الكود، أو التخصص)..."
                            style="padding-right: 50px; width: 100%; height: 52px; font-size: 1rem; border: 2px solid var(--border-soft); background: var(--bg-card); box-shadow: var(--shadow-ui);">
                    </div>

                    <div class="action-group">
                        <button class="app-btn-primary" onclick="window.location.href='add-trainer.html'"
                            style="box-shadow: 0 8px 15px rgba(26, 158, 156, 0.2); height: 52px;">
                            <i class="fa-solid fa-user-plus"></i> إضافة محاضر جديد
                        </button>
                    </div>
                </header>

                <div class="data-card">
                    <div class="table-responsive">
                        <table class="neuro-table">
                            <thead>
                                <tr>
                                    <th>المحاضر</th>
                                    <th>التخصص</th>
                                    <th>نوع التعاقد</th>
                                    <th>نظام الحساب</th>
                                    <th>الحالة</th>
                                    <th>إجراءات</th>
                                </tr>
                            </thead>
                            <tbody id="trainers-table-body">
                                <tr>
                                    <td colspan="6" style="text-align:center; padding:50px;" class="text-muted">
                                        جاري تحميل بيانات هيئة التدريس...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>


    </div>

    <!-- Trainer Modal -->
    <div class="modal-overlay" id="trainer-modal">
        <div class="modal-container">
            <div class="modal-premium-header">
                <div class="modal-premium-title">
                    <i class="fa-solid fa-chalkboard-user"></i>
                    <span>إضافة / تعديل بيانات المحاضر</span>
                </div>
                <button class="close-modal" onclick="Modal.close('trainer-modal')"
                    style="color: #fff; font-size: 2rem; background: transparent; border: none; cursor: pointer;">&times;</button>
            </div>

            <form id="trainer-form">
                <input type="hidden" name="trainerId">
                <div class="modal-body-scroll">
                    <!-- Section 1: Personal & Professional -->
                    <div class="form-section-card">
                        <div style="display: grid; grid-template-columns: 1fr 220px; gap: 30px; align-items: start;">
                            <div style="display: flex; flex-direction: column; gap: 20px;">
                                <div class="field-group">
                                    <label class="field-label">اسم المحاضر بالكامل <span>*</span></label>
                                    <input type="text" name="name" class="oval-input" required
                                        placeholder="أدخل الاسم الثلاثي للمحاضر"
                                        style="font-weight: 700; font-size: 1.1rem;">
                                </div>

                                <div class="row-meta-grid" style="grid-template-columns: 1.5fr 1fr;">
                                    <div class="field-group">
                                        <label class="field-label">رقم الهاتف الجوال <span>*</span></label>
                                        <input type="tel" name="phone" class="oval-input" required
                                            placeholder="01XXXXXXXXX" style="letter-spacing: 1px;">
                                    </div>
                                    <div class="field-group">
                                        <label class="field-label">التخصص / المادة</label>
                                        <input type="text" name="specialty" class="oval-input"
                                            placeholder="مثلاً: لغة عربية">
                                    </div>
                                </div>

                                <div class="row-meta-grid">
                                    <div class="field-group">
                                        <label class="field-label">كود المحاضر (ID) <span
                                                style="color:var(--accent-teal)">*</span></label>
                                        <input type="text" name="trainerCode" class="oval-input" placeholder="T-101"
                                            style="border-color: var(--accent-teal); font-weight: 800; color: var(--accent-teal);">
                                    </div>
                                    <div class="field-group">
                                        <label class="field-label">نوع التعاقد</label>
                                        <select name="contractType" class="oval-input" style="font-weight: 700;">
                                            <option value="full-time">دوام كامل (Full-time)</option>
                                            <option value="part-time">دوام جزئي (Part-time)</option>
                                            <option value="freelance">مستقل (Freelance)</option>
                                        </select>
                                    </div>
                                    <div class="field-group">
                                        <label class="field-label">الحالة</label>
                                        <select name="status" class="oval-input" style="font-weight: 700;">
                                            <option value="Active">نشط (Active)</option>
                                            <option value="Inactive">متوقف (Inactive)</option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                            <!-- QR Space -->
                            <div class="qr-side-card">
                                <i class="fa-solid fa-qrcode"></i>
                                <span>Attendance QR</span>
                                <small
                                    style="margin-top: 10px; font-size: 0.65rem; color: var(--text-muted); opacity: 0.8;">توليد
                                    تلقائي بالكود</small>
                            </div>
                        </div>
                    </div>

                    <!-- Section 2: Financials -->
                    <div class="form-section-card" style="border-right: 5px solid var(--accent-teal);">
                        <h3
                            style="margin-bottom: 20px; color: var(--accent-teal); font-weight: 900; display: flex; align-items: center; gap: 10px;">
                            <i class="fa-solid fa-sack-dollar"></i> الإعدادات المالية والرواتب
                        </h3>

                        <div class="row-meta-grid" style="grid-template-columns: 1.5fr 1fr 1fr;"
                            id="payment-fields-row">
                            <div class="field-group">
                                <label class="field-label">طريقة الحساب المتعاقد عليها</label>
                                <select name="paymentMode" class="oval-input"
                                    onchange="TrainersManager.togglePaymentFields(this.value)"
                                    style="font-weight: 800;">
                                    <option value="fixed">راتب ثابت / محاضرة ثابتة</option>
                                    <option value="ratio">نسبة مئوية من كل طالب</option>
                                    <option value="fixed_ratio">راتب أساسي ➕ نسبة عمولة</option>
                                </select>
                            </div>
                            <!-- Fixed Value Field -->
                            <div class="field-group" id="fixed-val-group">
                                <label class="field-label" id="fixed-label">المبلغ الثابت (ج.م)</label>
                                <input type="number" name="paymentValue" class="oval-input" value="0"
                                    style="font-weight: 900; color: var(--accent-teal);">
                            </div>
                            <!-- Ratio/Percentage Field (Only for Ratio or Mixed) -->
                            <div class="field-group" id="ratio-val-group" style="display: none;">
                                <label class="field-label" id="ratio-label">النسبة المئوية (%)</label>
                                <input type="number" name="paymentRatio" class="oval-input" value="0"
                                    style="font-weight: 900; color: #f59e0b; border-color: #f59e0b;">
                            </div>
                        </div>
                    </div>
                </div>

                <footer class="premium-footer">
                    <button type="button" class="btn-neuro"
                        style="background: transparent; border: 1.5px solid #64748b; color: #64748b; padding: 10px 30px;"
                        onclick="Modal.close('trainer-modal')">إلغاء</button>
                    <button type="submit" class="app-btn-primary"
                        style="padding: 12px 60px; box-shadow: 0 4px 15px rgba(26, 158, 156, 0.3);">
                        <i class="fa-solid fa-user-check"></i> حفظ بيانات المحاضر الآن
                    </button>
                </footer>
            </form>
        </div>
    </div>
    </div>
    </div>

    <!-- Scripts -->
    <script src="../js/core.js"></script>
    <script src="../js/permissions.js"></script>
    <script src="../js/audio-core.js"></script>
    <script src="../js/ui-core.js"></script>
    <script src="../js/theme-toggle.js"></script>
    <script src="../js/qr-attendance.js"></script>
    <script src="../js/id-generator.js"></script>
    <script src="../js/trainers.js"></script>


</body>

</html>

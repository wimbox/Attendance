<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>🔄 أداة استعادة البيانات - EduMaster Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 50px;
            max-width: 550px;
            width: 90%;
            text-align: center;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .logo {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 900;
            margin-bottom: 8px;
            color: #1a9e9c;
        }
        .subtitle {
            color: #94a3b8;
            font-size: 0.95rem;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        .drop-zone {
            border: 2px dashed rgba(26, 158, 156, 0.5);
            border-radius: 16px;
            padding: 50px 30px;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(26, 158, 156, 0.05);
            margin-bottom: 20px;
        }
        .drop-zone:hover, .drop-zone.dragover {
            border-color: #1a9e9c;
            background: rgba(26, 158, 156, 0.1);
            transform: scale(1.01);
        }
        .drop-zone .icon {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
        }
        .drop-zone p {
            font-size: 1rem;
            color: #94a3b8;
        }
        .drop-zone strong {
            color: #1a9e9c;
            cursor: pointer;
            text-decoration: underline;
        }
        input[type="file"] { display: none; }
        #status-box {
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            display: none;
            text-align: right;
            font-weight: 700;
            font-size: 0.95rem;
        }
        #status-box.reading { background: rgba(59, 130, 246, 0.15); border: 1px solid rgba(59, 130, 246, 0.3); color: #93c5fd; }
        #status-box.success { background: rgba(16, 185, 129, 0.15); border: 1px solid rgba(16, 185, 129, 0.3); color: #6ee7b7; }
        #status-box.error { background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3); color: #fca5a5; }
        .btn {
            display: inline-block;
            padding: 14px 35px;
            border-radius: 12px;
            font-family: 'Tajawal', sans-serif;
            font-size: 1rem;
            font-weight: 900;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
            margin-top: 15px;
        }
        .btn-primary { background: #1a9e9c; color: #fff; }
        .btn-primary:hover { background: #14827f; transform: translateY(-2px); }
        .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; }
        .btn-secondary:hover { background: rgba(255,255,255,0.2); }
        .progress-bar {
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 999px;
            margin-top: 15px;
            overflow: hidden;
            display: none;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #1a9e9c, #00e9e7);
            border-radius: 999px;
            width: 0%;
            transition: width 0.5s;
        }
        .summary-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.9rem;
        }
        .summary-item:last-child { border: none; }
        .badge {
            background: rgba(26, 158, 156, 0.2);
            color: #1a9e9c;
            padding: 2px 10px;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 900;
        }
    </style>

    <!-- Firebase SDKs -->
    <script src='https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js?v=12.9'></script>
    <script src='https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js?v=12.9'></script>
    <script src='../js/firebase-config.js?v=12.9'></script>
</head>
<body>
    <div class="card">
        <div class="logo">🔄</div>
        <h1>أداة استعادة البيانات</h1>
        <p class="subtitle">ارفع ملف النسخة الاحتياطية (.json) لاستعادة جميع بيانات النظام بشكل آمن وفوري</p>

        <div class="drop-zone" id="dropZone">
            <span class="icon">📂</span>
            <p>اسحب الملف هنا أو <strong onclick="document.getElementById('fileInput').click()">اختر ملف</strong></p>
            <p style="margin-top: 8px; font-size: 0.85rem;">يدعم ملفات .json فقط</p>
        </div>
        <input type="file" id="fileInput" accept=".json">

        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div id="status-box"></div>
        <div id="action-btns" style="display:none;"></div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const statusBox = document.getElementById('status-box');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const actionBtns = document.getElementById('action-btns');

        // Drag & drop
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) processFile(file);
        });
        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', () => {
            if (fileInput.files[0]) processFile(fileInput.files[0]);
        });

        function showStatus(msg, type) {
            statusBox.style.display = 'block';
            statusBox.className = type;
            statusBox.innerHTML = msg;
        }

        function processFile(file) {
            showStatus('⏳ جاري قراءة الملف...', 'reading');
            progressBar.style.display = 'block';
            progressFill.style.width = '30%';

            const reader = new FileReader();
            reader.onload = (e) => {
                progressFill.style.width = '60%';
                let data;
                try {
                    data = JSON.parse(e.target.result);
                } catch(err) {
                    showStatus('❌ الملف تالف أو ليس ملف JSON صحيح', 'error');
                    progressBar.style.display = 'none';
                    return;
                }

                const keys = Object.keys(data).filter(k => k !== 'backup_meta');
                const meta = data.backup_meta || {};
                const fileDate = meta.date ? new Date(meta.date).toLocaleString('ar-EG') : 'غير معروف';

                progressFill.style.width = '90%';

                // Show summary
                let keySummary = '';
                const keyMap = {
                    'edumaster_trainers': 'المحاضرون',
                    'edumaster_users': 'المستخدمون',
                    'edumaster_students': 'الطلاب',
                    'edumaster_study_groups': 'مجموعات الدراسة',
                    'edumaster_transactions': 'المعاملات المالية',
                    'edumaster_branches': 'الفروع',
                    'edumaster_books': 'الكتب',
                    'edumaster_app_books': 'قائمة الكتب',
                };
                keys.forEach(k => {
                    const label = keyMap[k] || k.replace('edumaster_', '');
                    const val = data[k];
                    const count = Array.isArray(val) ? `${val.length} سجل` : '✓';
                    keySummary += `<div class="summary-item"><span>${label}</span><span class="badge">${count}</span></div>`;
                });

                showStatus(`
                    <div style="margin-bottom:15px;">
                        <div style="font-size:1rem; color:#e2e8f0; margin-bottom:5px;">📋 ملخص الملف</div>
                        <div style="font-size:0.8rem; color:#64748b; margin-bottom:15px;">تاريخ النسخة: ${fileDate}</div>
                        ${keySummary}
                        <div style="margin-top:15px; padding:12px; background:rgba(239,68,68,0.1); border-radius:8px; color:#fca5a5; font-size:0.85rem;">
                            ⚠️ سيتم استبدال جميع البيانات الحالية بالبيانات الموجودة في هذا الملف
                        </div>
                    </div>
                `, 'reading');

                actionBtns.style.display = 'block';
                actionBtns.innerHTML = `
                    <button class="btn btn-primary" onclick="doRestore()">✅ تأكيد الاستعادة</button>
                    <button class="btn btn-secondary" onclick="location.reload()">إلغاء</button>
                `;

                progressFill.style.width = '100%';
                window._pendingRestoreData = data;
            };

            reader.onerror = () => {
                showStatus('❌ فشل في قراءة الملف', 'error');
                progressBar.style.display = 'none';
            };

            reader.readAsText(file);
        }

        function doRestore() {
            const data = window._pendingRestoreData;
            if (!data) return;

            actionBtns.innerHTML = '';
            showStatus('⏳ جاري كتابة البيانات...', 'reading');

            let count = 0;
            let failed = 0;

            for (const [key, value] of Object.entries(data)) {
                if (key === 'backup_meta') continue;
                const lsKey = key.startsWith('edumaster_') ? key : `edumaster_${key}`;
                try {
                    const serialized = typeof value === 'string' ? value : JSON.stringify(value);
                    localStorage.setItem(lsKey, serialized);
                    count++;
                } catch(err) {
                    console.warn('Failed to write:', lsKey, err);
                    failed++;
                }
            }

            // Reset IDB migration flag to force re-read from localStorage
            localStorage.removeItem('__idb_v2_done__');

            if (count > 0) {
                showStatus(`
                    <div style="text-align:center; padding:10px 0;">
                        <div style="font-size:2.5rem; margin-bottom:10px;">✅</div>
                        <div style="font-size:1.2rem; color:#6ee7b7; font-weight:900; margin-bottom:5px;">تمت الاستعادة بنجاح!</div>
                        <div style="color:#94a3b8; font-size:0.9rem;">تم استعادة ${count} وحدة من البيانات${failed > 0 ? ` (${failed} فشلت)` : ''}.</div>
                    </div>
                `, 'success');
                actionBtns.style.display = 'block';
                actionBtns.innerHTML = `
                    <button class="btn btn-primary" onclick="window.location.href='dashboard.html'">🏠 الذهاب للوحة التحكم</button>
                `;
            } else {
                showStatus('❌ لم يتم كتابة أي بيانات. تحقق من الملف.', 'error');
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduMaster Pro - الفروع</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/edumaster-ui.css">

    <!-- Firebase SDKs -->
    <script src='https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js'></script>
    <script src='https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js'></script>
    <script src='../js/firebase-config.js'></script>
</head>

<body>
    <div class="wrapper">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <!-- Injected by UICore -->
        </aside>

        <!-- Main Workspace -->
        <main class="main-content">
            <div class="content-container">
                <header class="top-bar">
                    <h1 class="page-title">إدارة الفروع</h1>
                    <div class="action-group">
                        <button class="btn-neuro btn-primary" id="btn-add-branch">
                            <i class="fa-solid fa-plus"></i> إضافة فرع جديد
                        </button>
                    </div>
                </header>
                <script>
                    document.addEventListener("DOMContentLoaded", () => {
                        // 🔒 RESTRICTION: Hide 'Add Branch' if inside a specific Branch
                        if (typeof Permissions !== 'undefined') {
                            const activeBranchId = Permissions.getActiveBranchId();
                            if (activeBranchId) {
                                const btnAdd = document.getElementById('btn-add-branch');
                                if (btnAdd) btnAdd.style.display = 'none';
                            }
                        }
                    });
                </script>

                <!-- Grid will be populated by JS -->
                <div class="stats-grid">
                    <div class="test-loader"
                        style="padding: 50px; text-align: center; color: var(--text-secondary); width: 100%;">
                        <i class="fa-solid fa-spinner fa-spin fa-2x"></i>
                        <p style="margin-top: 15px;">جاري تحميل بيانات الفروع...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Branch Modal -->
    <div class="modal-overlay" id="branch-modal">
        <div class="modal-container">
            <div class="modal-header">
                <h2 class="modal-title">بيانات الفرع</h2>
                <button class="close-modal">&times;</button>
            </div>
            <form id="branch-form">
                <input type="hidden" name="branchId">
                <div class="form-group">
                    <label>اسم الفرع</label>
                    <input type="text" name="name" class="form-control" placeholder="مثلاً: فرع القاهرة الرئيسي"
                        required>
                </div>
                <div class="form-divider"
                    style="margin: 20px 0; border-top: 1px solid var(--border-color); padding-top: 15px;">
                    <span style="font-size: 0.8rem; color: var(--accent-blue); font-weight: 700;">بيانات الدخول
                        والشعار</span>
                </div>
                <div class="form-group" style="margin-bottom: 15px;">
                    <label style="display: block; font-size: 0.82rem; font-weight: 700; color: var(--text-main); margin-bottom: 6px;">السعة القصوى للطلاب</label>
                    <input type="number" name="capacity" class="form-control" placeholder="0 = غير محدود" style="width: 100%; padding: 10px; border: 1px solid var(--border-soft); border-radius: 10px; background: var(--bg-input);">
                </div>
                <div class="form-group">
                    <label>اسم مستخدم المدير</label>
                    <input type="text" name="username" class="form-control" placeholder="admin_branchname">
                </div>
                <div class="form-group">
                    <label>كلمة المرور</label>
                    <input type="text" name="password" class="form-control" placeholder="123">
                </div>
                <div class="form-group">
                    <label>شعار الفرع (Logo)</label>
                    <div style="display: flex; gap: 12px; align-items: center;">
                        <input type="file" id="logo-upload" class="form-control" accept="image/*" style="flex: 1;">
                        <input type="hidden" name="logo" id="logo-hidden">
                        <div id="logo-preview-container"
                            style="width: 50px; height: 50px; border: 1px solid var(--border-color); border-radius: 8px; display: flex; align-items: center; justify-content: center; background: var(--bg-input); overflow: hidden;">
                            <i class="fa-solid fa-image" style="color: var(--text-secondary); opacity: 0.5;"></i>
                        </div>
                    </div>
                    <p style="font-size: 0.7rem; color: var(--text-secondary); margin-top: 4px;">يفضل استخدام صورة مربعة
                        بحجم صغير.</p>
                </div>
                <div style="margin-top: 32px; display: flex; gap: 12px;">
                    <button type="submit" class="btn-neuro btn-primary" style="flex:1;">حفظ البيانات</button>
                    <button type="button" class="btn-neuro btn-secondary close-modal" style="flex:1;">إلغاء</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Global Scripts -->
    <script src="../js/core.js"></script>
    <script src="../js/permissions.js"></script>
    <script src="../js/ui-core.js"></script>
    <script src="../js/branches.js"></script>
</body>

</html>

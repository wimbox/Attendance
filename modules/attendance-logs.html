<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل الحضور الذكي - EduMaster Pro</title>
    <link rel="stylesheet" href="../styles/edumaster-ui.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .log-container {
            background: var(--bg-card);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid var(--border-soft);
            box-shadow: var(--shadow-ui);
        }
        .stats-strip {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }
        .stat-card-mini {
            flex: 1;
            padding: 15px;
            border-radius: 12px;
            background: var(--bg-card);
            border: 1px solid var(--border-soft);
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
        }
        .stat-icon {
            width: 45px; height: 45px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem;
        }
        .category-student { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }
        .category-trainer { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .category-employee { background: rgba(245, 158, 11, 0.1); color: #f59e0b; }

        .type-pill {
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 800;
        }
        .type-student { background: #dcfce7; color: #166534; }
        .type-trainer { background: #dbeafe; color: #1e40af; }
        .type-employee { background: #fef9c3; color: #854d0e; }

        .view-toggle-btn {
            padding: 8px 18px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 800;
            border: 2px solid var(--accent-teal);
            background: var(--accent-teal-soft, rgba(26,158,156,0.1));
            color: var(--accent-teal);
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Tajawal', sans-serif;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .view-toggle-btn:hover {
            background: var(--accent-teal);
            color: #fff;
            transform: translateY(-1px);
        }

        /* Grouped view specific */
        .neuro-table th { white-space: nowrap; }
        .neuro-table td { color: var(--text-main); vertical-align: middle; }

        /* Dark Mode Overrides */
        body.dark-mode .log-container {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(10px);
        }
        body.dark-mode .neuro-table td {
            color: #cbd5e1;
            background: transparent !important;
        }
        body.dark-mode .type-student  { background: rgba(22, 101, 52, 0.2);  color: #4ade80; border: 1px solid rgba(74, 222, 128, 0.3); }
        body.dark-mode .type-trainer  { background: rgba(30, 64, 175, 0.2);  color: #60a5fa; border: 1px solid rgba(96, 165, 250, 0.3); }
        body.dark-mode .type-employee { background: rgba(133, 77, 14, 0.2);  color: #fbbf24; border: 1px solid rgba(251, 191, 36, 0.3); }
        body.dark-mode .app-btn-today { background: var(--accent-teal); color: #000; }
        body.dark-mode .view-toggle-btn { border-color: var(--accent-teal); }
    </style>
</head>
<body class="dashboard-body">
    <div class="wrapper">
        <aside class="sidebar"></aside>

        <main class="main-content">
            <div class="content-container">
                <header class="top-bar">
                    <div>
                        <h1 class="page-title"><i class="fa-solid fa-clipboard-list"></i> سجل الحضور اليومي (التفصيلي)</h1>
                        <p class="page-subtitle">عرض كافة عمليات المسح الضوئي والتحركات المسجلة اليوم</p>
                    </div>
                    <div class="action-group" style="gap: 8px;">
                        <button class="view-toggle-btn" id="view-toggle-btn" title="تبديل طريقة العرض">
                            <i class="fa-solid fa-list"></i> عرض تفصيلي
                        </button>
                        <button class="app-btn-today" onclick="window.AttendanceLogs && window.AttendanceLogs.resetToToday()" title="العودة لتاريخ اليوم">
                            <i class="fa-solid fa-calendar-day"></i> اليوم
                        </button>
                        <input type="date" id="log-date" class="app-input" style="width: 160px;">
                        <button class="app-btn-secondary" onclick="window.AttendanceLogs.pullFromCloud()" title="تزامن مع السحابة" style="background: #6366f1; color: #fff;">
                            <i class="fa-solid fa-cloud-arrow-down"></i> تحديث السحابة
                        </button>
                        <button class="app-btn-primary" onclick="window.exportToExcel && window.exportToExcel()">
                            <i class="fa-solid fa-file-excel"></i> تصدير إكسيل
                        </button>
                    </div>
                </header>

                <div class="stats-strip">
                    <div class="stat-card-mini">
                        <div class="stat-icon category-student"><i class="fa-solid fa-user-graduate"></i></div>
                        <div>
                            <div style="font-size: 0.8rem; color: var(--text-muted);">حضور الطلاب</div>
                            <div style="font-size: 1.2rem; font-weight: 900;" id="count-students">0</div>
                        </div>
                    </div>
                    <div class="stat-card-mini">
                        <div class="stat-icon category-trainer"><i class="fa-solid fa-person-chalkboard"></i></div>
                        <div>
                            <div style="font-size: 0.8rem; color: var(--text-muted);">حضور المدربين</div>
                            <div style="font-size: 1.2rem; font-weight: 900;" id="count-trainers">0</div>
                        </div>
                    </div>
                    <div class="stat-card-mini">
                        <div class="stat-icon category-employee"><i class="fa-solid fa-user-tie"></i></div>
                        <div>
                            <div style="font-size: 0.8rem; color: var(--text-muted);">حضور الموظفين</div>
                            <div style="font-size: 1.2rem; font-weight: 900;" id="count-employees">0</div>
                        </div>
                    </div>
                </div>

                <div class="log-container">
                    <table class="neuro-table">
                        <thead id="logs-thead">
                            <tr>
                                <th>التاريخ</th>
                                <th>الاسم</th>
                                <th>الفئة</th>
                                <th>وقت الحضور ▼</th>
                                <th>وقت الانصراف</th>
                                <th>المدة</th>
                                <th>الحالة</th>
                                <th>تحكم</th>
                            </tr>
                        </thead>
                        <tbody id="logs-tbody">
                            <!-- JS Rendered -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Firebase Cloud Sync (v9.0 - Single Load) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js?v=12.9"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js?v=12.9"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js?v=12.9"></script>
    <script src="../js/firebase-config.js?v=12.9"></script>

    <!-- Auditory Feedback Assets -->
    <audio id="sound-success" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3"></audio>
    <audio id="sound-error" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>

    <script src="../js/core.js?v=12.9"></script>
    <script src="../js/permissions.js?v=12.9"></script>
    <script src="../js/ui-core.js?v=12.9"></script>
    <script src="../js/audio-core.js?v=12.9"></script>
    <script src="../js/attendance-logs.js?v=12.9"></script>
</body>
</html>

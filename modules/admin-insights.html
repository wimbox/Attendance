<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduMaster Pro - نظرة المدير العام</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/edumaster-ui.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js?v=12.6"></script>
    <style>
        .insight-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 25px;
            border: 1px solid var(--border-soft);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            transition: 0.3s;
        }

        .insight-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
        }

        .branch-stat-row {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            border-bottom: 1px solid var(--border-soft);
        }

        .branch-stat-row:last-child {
            border-bottom: none;
        }

        .progress-bar-container {
            flex: 1;
            height: 8px;
            background: var(--bg-main);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--accent-teal);
            border-radius: 10px;
            transition: 1s ease-in-out;
        }

        .growth-badge {
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .growth-up {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
        }

        .growth-down {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }

        .admin-alert-banner {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: #fff;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 10px 25px rgba(245, 158, 11, 0.2);
        }
    </style>

    <!-- Firebase SDKs -->
    <script src='https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js'></script>
    <script src='https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js'></script>
    <script src='../js/firebase-config.js'></script>
</head>

<body>
    <div class="wrapper">
        <aside class="sidebar">
            <!-- Injected by UICore -->
        </aside>

        <main class="main-content">
            <div class="content-container">
                <header class="top-bar">
                    <div class="action-group">
                        <h1 class="page-title">🔭 رادار الإدارة العامة ونظرة النمو</h1>
                    </div>
                </header>

                <!-- Admin Executive Summary -->
                <div class="stats-grid" id="admin-kpi-grid">
                    <div class="stat-card gold-grad">
                        <div class="stat-icon"><i class="fa-solid fa-coins"></i></div>
                        <div class="stat-info">
                            <h3 id="total-revenue-all">0 ج.م</h3>
                            <p>إيرادات كافة الفروع</p>
                        </div>
                    </div>
                    <div class="stat-card teal-grad">
                        <div class="stat-icon"><i class="fa-solid fa-user-graduate"></i></div>
                        <div class="stat-info">
                            <h3 id="total-students-all">0</h3>
                            <p>إجمالي طلاب النظام</p>
                        </div>
                    </div>
                    <div class="stat-card purple-grad">
                        <div class="stat-icon"><i class="fa-solid fa-trophy"></i></div>
                        <div class="stat-info">
                            <h3 id="top-branch-name">--</h3>
                            <p>الفرع الأكثر نمواً</p>
                        </div>
                    </div>
                </div>

                <!-- Insights Section -->
                <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 30px; margin-top: 30px;">
                    <!-- Branch Performance Comparison -->
                    <div class="insight-card">
                        <h2 style="margin-bottom: 25px; font-weight: 900; color: var(--sidebar-bg);">📊 مقارنة أداء
                            الفروع</h2>
                        <div id="branch-performance-list">
                            <!-- Injected by JS -->
                        </div>
                        <div style="margin-top: 30px;">
                            <canvas id="branch-comparison-chart" height="300"></canvas>
                        </div>
                    </div>

                    <!-- Growth Alerts & Actions -->
                    <div style="display: flex; flex-direction: column; gap: 30px;">
                        <div class="insight-card" style="background: var(--sidebar-bg); color: #fff;">
                            <div
                                style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                                <h3 style="margin: 0; font-weight: 900; color: var(--accent-teal);"><i
                                        class="fa-solid fa-bolt"></i> تنبيهات الإدارة الذكية</h3>
                                <button class="app-btn-primary"
                                    style="font-size: 0.7rem; padding: 5px 10px; background: rgba(0, 234, 255, 0.1) !important; border: 1px solid rgba(0, 234, 255, 0.2);"
                                    onclick="awardStudentOfMonth()">
                                    <i class="fa-solid fa-award"></i> منح جوائز الشهر
                                </button>
                            </div>
                            <div id="growth-alerts-container">
                                <div style="padding: 20px; text-align: center; opacity: 0.5;">
                                    <i class="fa-solid fa-spinner fa-spin"></i> جاري تحليل البيانات...
                                </div>
                            </div>
                        </div>

                        <!-- 🚨 NEW: CHURN AI / RETENTION SECTION -->
                        <div class="insight-card" style="background: #7f1d1d; color: #fff; border: 1px solid #f87171;">
                            <h3 style="margin-bottom: 15px; font-weight: 900; color: #fca5a5;">
                                <i class="fa-solid fa-person-walking-arrow-right"></i> رادار الانقطاع (Churn AI)
                            </h3>
                            <p style="font-size: 0.75rem; color: #fecaca; margin-bottom: 15px; opacity: 0.8;">
                                طلاب منقطعين لأكثر من 3 أيام (بناءً على سجل الحضور)
                            </p>
                            <div id="churn-risk-container" style="display: flex; flex-direction: column; gap: 10px;">
                                <div style="padding: 10px; text-align: center; opacity: 0.5;">جاري الفحص...</div>
                            </div>
                        </div>

                        <div class="insight-card">
                            <h3 style="margin-bottom: 20px; font-weight: 900;"><i
                                    class="fa-solid fa-calendar-check"></i> توزيع الطلاب</h3>
                            <canvas id="student-distribution-chart"></canvas>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="../js/core.js?v=12.6"></script>
    <script src="../js/permissions.js?v=12.6"></script>
    <script src="../js/ui-core.js?v=12.6"></script>
    <script src="../js/accounting-core.js?v=12.6"></script>
    <script src="../js/admin-insights.js?v=12.6"></script>
    <script src="../js/churn-ai.js?v=12.6"></script>
    <script src="../js/certification-engine.js?v=12.6"></script>
    <script src="../js/theme-toggle.js?v=12.6"></script>

    <script>
        UICore.init();

        function awardStudentOfMonth() {
            const now = new Date();
            const winners = CertificationEngine.autoAwardStudentOfTheMonth(now.getMonth(), now.getFullYear());

            if (winners.length > 0) {
                Toast.show(`🌟 تم منح ${winners.length} طلاب لقب "طالب الشهر" بنجاح!`, 'success');
                if (window.AdminInsights) window.AdminInsights.renderGrowthAlerts();
            } else {
                Toast.show('لم يتم العثور على طلاب جدد يستحقون اللقب لهذا الشهر بناءً على المعايير.', 'info');
            }
        }
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة الحضور والمغادرة الذكية - EduMaster</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script> <!-- القارئ الاحترافي -->
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --accent: #10b981;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            overflow-x: hidden;
            display: flex; flex-direction: column;
            min-height: 100vh;
        }

        /* Header */
        header {
            padding: 30px 20px;
            background: linear-gradient(135deg, var(--primary), #818cf8);
            border-bottom-right-radius: 40px;
            border-bottom-left-radius: 40px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            margin-bottom: 25px;
        }

        .logo-icon {
            font-size: 2.5rem; color: white; margin-bottom: 10px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        h1 { margin: 0; font-size: 1.5rem; font-weight: 900; letter-spacing: -0.5px; }
        .sub-header { font-size: 0.9rem; opacity: 0.8; margin-top: 5px; }

        /* Connection Status Dot */
        .conn-badge {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 4px 12px; border-radius: 50px;
            font-size: 0.75rem; font-weight: 800; margin-top: 10px;
            background: rgba(0,0,0,0.1);
        }
        .dot { width: 8px; height: 8px; border-radius: 50%; display: block; }
        .dot-green { background: #10b981; box-shadow: 0 0 10px #10b981; }
        .dot-red { background: #ef4444; box-shadow: 0 0 10px #ef4444; }
        .dot-orange { background: #f59e0b; box-shadow: 0 0 10px #f59e0b; }

        /* Main Content */
        main { flex: 1; padding: 0 20px 40px; }

        .auth-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .input-group { margin-bottom: 20px; text-align: right; }
        label { display: block; margin-bottom: 8px; font-weight: 700; color: var(--text-muted); font-size: 0.85rem; }
        
        select, input {
            width: 100%; padding: 14px;
            background: rgba(15,23,42,0.5);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white; font-family: inherit; font-size: 1rem;
            box-sizing: border-box; transition: all 0.3s;
        }

        select:focus, input:focus { border-color: var(--primary); outline: none; background: rgba(15,23,42,0.8); }

        /* Scanner Section */
        #scanner-box {
            display: none;
            overflow: hidden;
            border-radius: 20px;
            margin-top: 20px;
            background: black;
            border: 4px solid var(--primary);
            position: relative;
        }

        #reader { width: 100%; }

        .btn-action {
            width: 100%; padding: 16px;
            background: var(--primary);
            color: white; border: none;
            border-radius: 14px;
            font-weight: 900; font-size: 1.1rem;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
            transition: all 0.3s;
        }

        .btn-action:active { transform: scale(0.97); }
        .btn-action.scanning { background: #ef4444; box-shadow: 0 8px 20px rgba(239, 68, 68, 0.3); }

        /* Status Overlay */
        .status-msg {
            margin-top: 20px; padding: 15px; border-radius: 12px;
            text-align: center; font-weight: 700; display: none;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp { from {transform: translateY(20px); opacity: 0;} to {transform: translateY(0); opacity: 1;} }

        /* Footer */
        footer {
            text-align: center; padding: 20px;
            font-size: 0.8rem; color: var(--text-muted);
        }

        /* Success/Error UI */
        .success-overlay {
            position: fixed; inset: 0; background: var(--bg);
            z-index: 1000; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 40px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-icon"><i class="fa-solid fa-expand"></i></div>
        <h1>بوابة الحضور الذكية</h1>
        <div class="sub-header">تسجيل الدخول: طلاب، محاضرين، موظفين</div>
        <div id="connection-status" class="conn-badge">
            <span class="dot dot-orange"></span>
            <span id="conn-text">جاري التحقق...</span>
        </div>
    </header>

    <main>
        <div class="auth-card" id="main-ui">
            <!-- 📷 Camera moved to the TOP -->
            <div id="scanner-box" style="margin-bottom: 25px;">
                <div id="reader"></div>
            </div>
            
            <div id="status-display" class="status-msg" style="margin-bottom: 20px;"></div>

            <div class="input-group">
                <label>اختر صفتك</label>
                <select id="user-type">
                    <option value="STUDENT">طالب (S)</option>
                    <option value="TRAINER">محاضر / مدرب (T)</option>
                    <option value="EMPLOYEE">موظف إداري (E)</option>
                </select>
            </div>

            <div class="input-group">
                <label>كود الهوية الخاص بك</label>
                <input type="text" id="user-id" placeholder="مثال: S101 أو اسمك" inputmode="none">
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding: 0 5px;">
                <label style="display: flex; align-items: center; gap: 8px; margin: 0; cursor: pointer; color: var(--text-muted); font-weight: normal;">
                    <input type="checkbox" id="remember-me" checked style="width: auto; margin: 0; accent-color: var(--primary);">
                    تذكر بياناتي
                </label>
                <button onclick="window.Portal && window.Portal.resetData()" style="background: none; border: none; color: #ef4444; font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; gap: 5px;">
                    <i class="fa-solid fa-rotate-right"></i> تصفير البيانات
                </button>
                <button onclick="window.Portal && window.Portal.pullFullSync()" style="background: none; border: none; color: var(--accent); font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; gap: 5px; font-weight:800;">
                    <i class="fa-solid fa-cloud-arrow-down"></i> تحديث البيانات سحابياً
                </button>
            </div>

            <button class="btn-action" id="toggle-scan">
                <i class="fa-solid fa-qrcode"></i>
                <span id="btn-text">فتح الكاميرا للمسح</span>
            </button>
        </div>
    </main>

    <div class="success-overlay" id="success-screen">
        <div style="font-size: 5rem; color: var(--accent); margin-bottom: 20px;">
            <i class="fa-solid fa-circle-check"></i>
        </div>
        <h2 style="font-size: 2rem;">تم تسجيلك بنجاح!</h2>
        <p id="success-done-msg" style="color: var(--text-muted); line-height: 1.6;"></p>
        <button class="btn-action" style="margin-top: 30px; width: auto; padding: 15px 40px;" onclick="location.reload()">
            رجوع
        </button>
    </div>

    <footer>
        &copy; 2026 EduMaster Pro - v3.9 - جميع الحقوق محفوظة
    </footer>

    <!-- Firebase Cloud Sync (v3.0) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="../js/firebase-config.js?v=7.4"></script>
    
    <script src="../js/core.js?v=7.4"></script>
    <script src="../js/staff-portal.js?v=7.4"></script>
</body>
</html>

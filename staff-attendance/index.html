<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>بوابة الحضور الذكية | EduMaster</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script> 
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --accent: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #0f121d;
            --card-bg: #1e2536;
            --input-bg: #f8fafc;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --header-grad: linear-gradient(135deg, #6366f1, #4f46e5);
            --header-height: 180px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            font-family: 'Cairo', 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            overflow-x: hidden;
            display: flex; flex-direction: column;
            min-height: 100vh;
        }

        /* ─── Header Section ─── */
        header {
            padding: 40px 20px 60px;
            background: linear-gradient(to bottom, #818cf8, #6366f1);
            border-bottom-right-radius: 60px;
            border-bottom-left-radius: 60px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            position: relative;
            z-index: 10;
        }

        .header-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #ffffff;
            opacity: 0.95;
            margin-bottom: 20px;
            display: block;
        }

        .conn-badge {
            display: inline-flex; align-items: center; gap: 10px;
            padding: 10px 20px; border-radius: 50px;
            font-size: 0.95rem; font-weight: 900;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .dot-pulse {
            width: 10px; height: 10px; border-radius: 50%; display: block;
            position: relative;
        }
        .dot-pulse::after {
            content: ''; position: absolute; inset: -4px; border-radius: 50%;
            background: inherit; opacity: 0.5; animation: pulse 1.5s infinite;
        }
        .dot-green { background: #10b981; }
        .dot-red { background: #ef4444; }
        .dot-orange { background: #f59e0b; }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(3); opacity: 0; }
        }

        /* ─── Sync Status Banner ─── */
        .sync-banner-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: -30px;
            position: relative;
            z-index: 15;
            padding: 0 20px;
        }

        .sync-banner {
            background: #26211c;
            color: #f59e0b;
            padding: 14px 40px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1.1rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            border-bottom: 2px solid #3d352b;
            display: none; /* Controlled by Portal.js */
            min-width: 250px;
            text-align: center;
        }

        /* ─── Main Form ─── */
        main { flex: 1; padding: 40px 20px; max-width: 500px; margin: 0 auto; width: 100%; }

        .auth-card {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 35px 25px;
            border: 1px solid rgba(255,255,255,0.03);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            margin-bottom: 25px;
        }

        .input-group { margin-bottom: 25px; text-align: right; }
        label { display: block; margin-bottom: 12px; font-weight: 800; color: var(--text-muted); font-size: 0.95rem; }
        
        select {
            width: 100%; padding: 18px 20px;
            background: rgba(15, 21, 38, 0.7);
            border: 2.5px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            color: #fff; font-family: inherit; font-size: 1.2rem; font-weight: 900;
            box-sizing: border-box; transition: all 0.3s;
            appearance: none;
            cursor: pointer;
        }

        #user-id {
            width: 100%; padding: 22px 25px;
            background: var(--input-bg);
            border: none;
            border-radius: 20px;
            color: #1e293b; font-family: 'Outfit', sans-serif; font-size: 1.6rem; font-weight: 800;
            box-sizing: border-box; transition: all 0.3s;
            text-align: center;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
        }

        select:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2); }

        /* ─── Utility Options ─── */
        .util-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            margin-bottom: 35px;
            padding: 0 5px;
        }

        .remember-me-label {
            display: flex; align-items: center; gap: 10px;
            color: var(--text-muted); font-weight: 700; font-size: 0.95rem;
            cursor: pointer;
        }

        .remember-me-label input {
            width: 20px; height: 20px; border-radius: 6px; accent-color: var(--primary);
        }

        .util-btn {
            background: none; border: none; font-size: 1rem; font-weight: 900;
            cursor: pointer; display: flex; align-items: center; gap: 8px;
            transition: transform 0.2s;
        }
        .util-btn:active { transform: scale(0.95); }
        .util-btn.reset { color: var(--danger); }
        .util-btn.sync { color: var(--accent); }

        /* ─── Action Buttons ─── */
        .btn-stack { display: flex; flex-direction: column; gap: 15px; }

        .btn-action {
            width: 100%; padding: 22px;
            border: none;
            border-radius: 20px;
            font-weight: 900; font-size: 1.25rem;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 15px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .btn-blue {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            box-shadow: 0 8px 30px rgba(99, 102, 241, 0.4);
        }

        .btn-green {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            box-shadow: 0 8px 30px rgba(16, 185, 129, 0.4);
            display: none; /* Initially hidden, shown by staff-portal.js */
        }

        .btn-action:active { transform: scale(0.97) translateY(2px); filter: brightness(0.9); }

        /* ─── Scanner UI ─── */
        #scanner-box {
            display: none;
            overflow: hidden;
            border-radius: 24px;
            margin-bottom: 25px;
            background: #000;
            border: 4px solid var(--primary);
            box-shadow: 0 0 50px rgba(99, 102, 241, 0.3);
        }
        #reader { width: 100%; }

        /* ─── Status Info ─── */
        #status-display {
            padding: 20px; border-radius: 18px;
            text-align: center; font-weight: 800; font-size: 1.1rem;
            margin-bottom: 25px; display: none;
            border: 1px solid rgba(255,255,255,0.05);
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp { from {transform: translateY(15px); opacity: 0;} to {transform: translateY(0); opacity: 1;} }

        /* ─── Success Screen ─── */
        .success-overlay {
            position: fixed; inset: 0; background: var(--bg);
            z-index: 2000; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 40px;
        }

        footer {
            text-align: center; padding: 30px;
            font-size: 0.9rem; color: var(--text-muted); font-weight: 700;
        }
    </style>
</head>
<body>

    <header>
        <span class="header-title">تسجيل الدخول: طلاب، محاضرين، موظفين</span>
        <div id="connection-status" class="conn-badge">
            <span class="dot-pulse dot-orange"></span>
            <span id="conn-text">جاري التحقق من السحاب...</span>
        </div>
    </header>

    <div class="sync-banner-container">
        <div id="status-display" class="sync-banner">جارٍ المزامنة السحابية...</div>
    </div>

    <main>
        <div class="auth-card" id="main-ui">
            <!-- QR Scanner Container -->
            <div id="scanner-box">
                <div id="reader"></div>
            </div>

            <div class="input-group">
                <label>اختر صفتك</label>
                <div style="position:relative;">
                    <select id="user-type">
                        <option value="STUDENT">طالب (S)</option>
                        <option value="TRAINER">محاضر / مدرب (T)</option>
                        <option value="EMPLOYEE">موظف إداري (E)</option>
                    </select>
                    <i class="fa-solid fa-chevron-down" style="position:absolute; left:20px; top:50%; transform:translateY(-50%); color:var(--primary); pointer-events:none;"></i>
                </div>
            </div>

            <div class="input-group">
                <label>كود الهوية الخاص بك</label>
                <input type="text" id="user-id" placeholder="ID: S-1xxx" spellcheck="false" autocomplete="off">
            </div>

            <div class="util-row">
                <label class="remember-me-label">
                    <input type="checkbox" id="remember-me" checked>
                    تذكر بياناتي
                </label>
                
                <div style="display: flex; gap: 20px;">
                    <button class="util-btn reset" onclick="window.Portal && window.Portal.resetData()">
                        <i class="fa-solid fa-fire-flame-curved"></i> تصفير البيانات
                    </button>
                    <button class="util-btn sync" onclick="window.Portal && window.Portal.pullFullSync()">
                        <i class="fa-solid fa-cloud-arrow-down"></i> تحديث البيانات سحابياً
                    </button>
                </div>
            </div>

            <div class="btn-stack">
                <button class="btn-action btn-blue" id="toggle-scan">
                    <i class="fa-solid fa-qrcode" style="font-size:1.6rem;"></i>
                    <span id="btn-text">فتح الكاميرا للمسح</span>
                </button>
                
                <!-- This button is controlled by staff-portal.js showManualOption -->
                <button class="btn-action btn-green" id="manual-checkin-btn" style="display: none;">
                    <i class="fa-solid fa-hand-pointer" style="font-size:1.6rem;"></i>
                    <span>تسجيل دخول يدوي (أوفلاين)</span>
                </button>
            </div>
        </div>
    </main>

    <div class="success-overlay" id="success-screen">
        <div style="font-size: 6rem; color: var(--accent); margin-bottom: 30px;">
            <i class="fa-solid fa-circle-check"></i>
        </div>
        <h2 style="font-size: 2.2rem; margin-bottom: 15px;">تم تسجيلك بنجاح!</h2>
        <p id="success-done-msg" style="color: var(--text-muted); font-size: 1.2rem; line-height: 1.6; max-width: 300px;"></p>
        <button class="btn-action btn-blue" style="margin-top: 40px; width: auto; padding: 18px 60px;" onclick="location.reload()">
            رجوع للرئيسية
        </button>
    </div>

    <footer>
        &copy; 2026 EduMaster Pro - v4.0 - جميع الحقوق محفوظة
    </footer>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="../js/firebase-config.js?v=8.0"></script>
    
    <script src="../js/core.js?v=8.0"></script>
    <script src="../js/staff-portal.js?v=8.0"></script>
</body>
</html>
